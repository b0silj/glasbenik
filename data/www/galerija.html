        <div class="section-title title-blue">GALERIJA</div>
        <ul class="nav gallery-tabs mt-3" role="tablist">
          <li class="nav-item flex-fill"><button class="nav-link active w-100" data-bs-toggle="tab" data-bs-target="#foto" type="button" role="tab">FOTO</button></li>
          <li class="nav-item flex-fill"><button class="nav-link w-100" data-bs-toggle="tab" data-bs-target="#video" type="button" role="tab">VIDEO</button></li>
        </ul>

        <div class="tab-content gallery-shell mt-4">
          <div class="tab-pane fade show active" id="foto" role="tabpanel">
            <div class="gallery-grid">
              <button class="gallery-item" data-full="img/gallery-1.png" data-bs-toggle="modal" data-bs-target="#imageModal"><img src="img/gallery-1.png" alt="Fotografija 1"></button>
              <button class="gallery-item" data-full="img/gallery-2.png" data-bs-toggle="modal" data-bs-target="#imageModal"><img src="img/gallery-2.png" alt="Fotografija 2"></button>

              <button class="gallery-item" data-full="img/gallery-8.png" data-bs-toggle="modal" data-bs-target="#imageModal"><img src="img/gallery-8.png" alt="Fotografija 8"></button>
            </div>
          </div>
          <div class="tab-pane fade" id="video" role="tabpanel">
            <div class="video-list">
              <a class="video-card" href="https://www.youtube.com/watch?v=x8ts3_fmJLA" target="_blank" rel="noreferrer"><img src="img/video-1.png" alt="Video 1"><span class="play-button"></span></a>
              <a class="video-card" href="https://www.youtube.com/watch?v=rT6nBBWt0oM" target="_blank" rel="noreferrer"><img src="img/video-2.png" alt="Video 2"><span class="play-button"></span></a>
